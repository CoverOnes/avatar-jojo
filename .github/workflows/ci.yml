name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Independent Python gate for avatar-jojo (NOT the Go `task check` pipeline).
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff
        run: ruff check .

      - name: mypy --strict
        run: mypy --strict avatar tests

      - name: pytest
        env:
          APP_ENV: dev
        run: pytest -q
